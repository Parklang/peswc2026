<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 — Quản Lý Giải Đấu</title>
  <meta name="description" content="Quản lý lịch thi đấu, kết quả, bảng xếp hạng và thống kê World Cup 2026" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Sidebar Nav -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚽</div>
      <div class="logo-text">
        <span class="logo-wc">WORLD CUP</span>
        <span class="logo-year">2026</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#schedule" class="nav-item active" data-page="schedule">
        <i class="fa-regular fa-calendar"></i>
        <span>Lịch Thi Đấu</span>
      </a>
      <a href="#results" class="nav-item" data-page="results">
        <i class="fa-solid fa-futbol"></i>
        <span>Kết Quả</span>
      </a>
      <a href="#standings" class="nav-item" data-page="standings">
        <i class="fa-solid fa-table-list"></i>
        <span>Bảng Xếp Hạng</span>
      </a>
      <a href="#stats" class="nav-item" data-page="stats">
        <i class="fa-solid fa-chart-bar"></i>
        <span>Thống Kê</span>
      </a>
      <a href="#knockout" class="nav-item" data-page="knockout">
        <i class="fa-solid fa-trophy"></i>
        <span>Nhánh Đấu & Bốc Thăm</span>
      </a>
      <div class="nav-divider"></div>
      <a href="#admin" class="nav-item" data-page="admin">
        <i class="fa-solid fa-sliders"></i>
        <span>Admin Panel</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <span>FIFA World Cup™ 2026</span>
      <span>USA · Canada · Mexico</span>
    </div>
  </aside>

  <!-- Mobile toggle -->
  <button class="sidebar-toggle" id="sidebarToggle">
    <i class="fa-solid fa-bars"></i>
  </button>

  <!-- Main content -->
  <main class="main-content" id="mainContent">
    <div id="page-schedule" class="page active"></div>
    <div id="page-results" class="page"></div>
    <div id="page-standings" class="page"></div>
    <div id="page-stats" class="page"></div>
    <div id="page-knockout" class="page"></div>
    <div id="page-admin" class="page"></div>
  </main>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <script src="/js/app.js"></script>
  <script src="/js/schedule.js"></script>
  <script src="/js/results.js"></script>
  <script src="/js/standings.js"></script>
  <script src="/js/stats.js"></script>
  <script src="/js/knockout.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
